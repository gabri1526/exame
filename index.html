<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Galería de Fotos</title>
    <style>
        /* Un poco de estilo para que no se vea desordenado */
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .contenedor { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        img { border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 100%; height: auto; }
    </style>
</head>
<body>

    <h1>Bienvenido a mi página</h1>
    <p>Aquí tienes las dos imágenes que me pediste:</p>

    <div class="contenedor">
        <figure>
            <img src="banderinRosario.jpeg" alt="banderin da cofradia" width="400">
            <figcaption>Banderín da cofradía do Rosario</figcaption>
        </figure>

        <figure>
            <img src="cristoYacente.jpg" alt="paso principal da cofradía" width="400">
            <figcaption>Titular da cofradía</figcaption>
        </figure>
    </div>

</body>
</html>
